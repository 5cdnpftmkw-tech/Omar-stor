<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجري الأسطوري</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
</head>
<body class="bg-slate-950 text-white selection:bg-cyan-500">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const products = [
                { id: 1, name: 'ساعة ذكية فاخرة', price: '45.00', image: 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=400&q=80' },
                { id: 2, name: 'سماعات احترافية', price: '29.99', image: 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=400&q=80' },
                { id: 3, name: 'نظارات شمسية', price: '15.50', image: 'https://images.unsplash.com/photo-1511499767150-a48a237f0083?auto=format&fit=crop&w=400&q=80' }
            ];

            const buyItem = (name) => {
                alert(`تم طلب ${name} بنجاح! سيتم التواصل معك قريباً.`);
            };

            return (
                <div className="min-h-screen font-sans">
                    {/* قسم الترحيب */}
                    <header className="py-20 text-center relative overflow-hidden">
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-64 h-64 bg-cyan-500/30 blur-[100px] rounded-full"></div>
                        <h1 className="text-5xl md:text-7xl font-extrabold mb-4 bg-gradient-to-r from-cyan-400 to-purple-500 text-transparent bg-clip-text relative z-10">
                            اكتشف المستقبل
                        </h1>
                        <p className="text-slate-400 text-lg relative z-10">أفضل المنتجات بأسعار لا تقبل المنافسة</p>
                    </header>

                    {/* المنتجات */}
                    <main className="max-w-6xl mx-auto px-4 pb-20 grid grid-cols-1 md:grid-cols-3 gap-6">
                        {products.map(p => (
                            <div key={p.id} className="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden hover:border-cyan-500 transition duration-300">
                                <img src={p.image} alt={p.name} className="w-full h-56 object-cover hover:scale-105 transition duration-500" />
                                <div className="p-6">
                                    <h3 className="text-xl font-bold mb-2">{p.name}</h3>
                                    <p className="text-cyan-400 font-bold text-lg mb-4">${p.price}</p>
                                    <button 
                                        onClick={() => buyItem(p.name)}
                                        className="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-cyan-500/30"
                                    >
                                        شراء الآن ⚡
                                    </button>
                                </div>
                            </div>
                        ))}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
